<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cousin apartment placeholder scene art</title>
  <desc id="desc">Gritty pixel-inspired apartment interior with worn couch, blinds, and city glow.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4048"/>
      <stop offset="100%" stop-color="#1b2026"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2621"/>
      <stop offset="100%" stop-color="#1b1713"/>
    </linearGradient>
    <filter id="noise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="1" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#wall)"/>
  <rect y="490" width="1280" height="230" fill="url(#floor)"/>

  <rect x="820" y="120" width="360" height="280" fill="#0e141a" stroke="#4a5560" stroke-width="10"/>
  <rect x="842" y="142" width="316" height="236" fill="#1f2f3e"/>
  <g opacity="0.7">
    <rect x="848" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="892" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="936" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="980" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="1024" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="1068" y="142" width="10" height="236" fill="#63717e"/>
    <rect x="1112" y="142" width="10" height="236" fill="#63717e"/>
  </g>

  <rect x="120" y="360" width="540" height="170" rx="12" fill="#4d575f"/>
  <rect x="140" y="390" width="500" height="120" rx="8" fill="#353d45"/>
  <rect x="160" y="330" width="220" height="55" rx="8" fill="#434c55"/>
  <rect x="405" y="330" width="220" height="55" rx="8" fill="#434c55"/>

  <rect x="700" y="438" width="220" height="70" rx="4" fill="#5a3b2e"/>
  <rect x="720" y="416" width="30" height="22" fill="#343a40"/>
  <rect x="765" y="416" width="30" height="22" fill="#343a40"/>

  <rect x="278" y="470" width="160" height="80" fill="#14181e" stroke="#2d333b" stroke-width="5"/>
  <text x="358" y="518" fill="#8ea0b2" font-size="28" text-anchor="middle" font-family="monospace">DUFFEL</text>

  <rect width="1280" height="720" filter="url(#noise)"/>
  <text x="36" y="680" fill="#9fb4c8" font-size="28" font-family="monospace">COUSIN'S APARTMENT / PLACEHOLDER SCENE ART / V0.3</text>
</svg>
