<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>907 Hustle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;700&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="status-bar panel">
        <h1>907 HUSTLE // ANCHORAGE RUN</h1>
        <div id="hudStats" class="status-stats"></div>
      </header>

      <nav class="nav-row" id="mainNav"></nav>

      <section id="mainPanel" class="main-panel panel"></section>

      <section class="message-strip panel">
        <div class="panel-header">
          <h3>Street Feed</h3>
          <button id="clearFeedBtn" class="btn ghost" type="button">Clear</button>
        </div>
        <div id="eventFeed" class="event-feed"></div>
      </section>

      <div class="action-bar">
        <button id="travelModalBtn" class="btn secondary" type="button">Travel<small>change city</small></button>
        <button id="stayBtn" class="btn primary" type="button">Lay Low<small id="stayBtnSub">advance time</small></button>
      </div>
    </main>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <div class="modal panel" role="dialog" aria-modal="true">
        <div class="panel-header">
          <h3 id="modalTitle">Modal</h3>
          <button id="modalCloseBtn" class="btn ghost" type="button">Close</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <script src="combat.js"></script>
    <script src="events.js"></script>
    <script src="script.js"></script>
  </body>
</html>
